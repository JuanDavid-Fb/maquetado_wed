<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- las etiquetas table se utilizan para definir tablas en html -->

    <!-- la etiqueta tr define una fila en la tabla cada fila puede contener varias celdas -->

    <!-- la etiqueta td define una celda de datosdentro de una fila -->

    <!-- la etiqueta th define una celda de encabezado en la tabla dentro de una fila -->

    <table border="2">   <!-- etiqueta de apertura-->
        <tr> <!-- fila 1 -->
            <th>Nombre</th> <!-- celda encabezado -->
            <th>Edad</th> <!-- celda encabezado -->
            <th>Ciudad</th><!-- celda encabezado -->
        </tr>

        <tr> <!-- fila 2 -->
            <td>Juan</td> <!-- celda de datos -->   
            <td>30</td> <!-- celda de datos -->
            <td>Madrid</td> <!-- celda de datos -->
        </tr>

        <tr> <!-- fila 3 -->
            <td>Ana</td> <!-- celda de datos -->
            <td>25</td> <!-- celda de datos -->
            <td>Barcelona</td> <!-- celda de datos -->
        </tr>
          </table> <!-- etiqueta de cierre -->
    
          <br>
    
          <table border="2">   <!-- etiqueta de apertura-->
        <tr> <!-- fila 1 -->
            <th>Pais</th> <!-- celda encabezado -->
            <th>Capital</th> <!-- celda encabezado -->
        </tr>

        <tr> <!-- fila 2 -->
            <td>francia</td> <!-- celda de datos -->   
            <td>españa</td> <!-- celda de datos -->
        </tr>
        <br>
        <tr> <!-- fila 3 -->
            <td>roma</td> <!-- celda de datos -->
            <td>italia</td> <!-- celda de datos -->
        </tr>
    </table> <!-- etiqueta de cierre -->
<br>
    <table border="2">
        <tr>
            <th colspan="4">Mundial de futbol</th> <!--celda de encabezado que abarca 4 columnasdos columnas-->
        </tr>
        <tr>
            <td rowspan="3">paises con mayoria de goles</td>
            <!-- celda de datos que abarca filas -->
             <td> brasil 2</td> <td>230</td>
        </tr>

        <tr>
            <td>alemania</td> <td>180</td>
        </tr>

        <tr>
            <td>argentina</td> <td>150</td>
        </tr>

    </table>
</body>
</html>
