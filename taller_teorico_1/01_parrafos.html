<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>parrafos y encabezados</title>
</head>
<body>
    <!-- titulos o encabezados: 
     se tiene 6 tipos de encabezados, desde el h1 hasta el h6-->
     <!--  (h$*6) crea 6 titulos en orden del 1 al 6 emmet -->
    <h1>titulo</h1>
    <h2>subtitulo</h2>
    <h3>subtitulo</h3>
    <h4>subtitulo</h4>
    <h5>subtitulo</h5>
    <h6>subtitulo</h6>

    <!-- parrafo: los parrafos den tener una idea o punto especifico. cada parrafo escrito debe contener un concepto, una idea. es decir puede describir una session o un elemento hasta un mensaje en el chat por ejemplo: en una session se habla sobre los beneficios de la actividad fisica, entonces el parrafo se puede escribir sobre los beneficios de la actividad fisica. cada parrafo debe contener una idea o concepto especifico. finalmente debe existir un motivo para que exista un parrafo-->

    <p>Este es un párrafo de texto.</p>
    <p>
     <!-- (CTRL+SHIFT+P) o (ALT+Z) Ajusta el contenido del párrafo a la ventana del edito -->
     <!--Existen algunas tecnologías de asistencia como lectores de pantalla, que ayudan a las personas con discapacidad visual a navegar por el contenido web.Por ejemplo: cuando estas tecnologías leen el h1 dede la página, entienden de que trata la página por el h1. Por temas de accesibilidad web es importante que se utilice solo un h1 por página.--> </p>
</body>
</html>
