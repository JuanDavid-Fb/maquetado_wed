<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>imagenes</title>
    <!-- https://starteq.net/los-7-logos-de-empresas-mas-recordados-de-la-historia/ -->
</head>
<body>
    <!-- etiquetas de bloque y lineas -->
     <h1> imagenes </h1>
     <!-- las imagenes se insertan en html con la etiqueta <img> -->

     <!-- vale la pena recordar que el atributo little proporciona un tooltip se muestra cuando el usuario pasa el cursor sobre la imagen -->
      <img src="Microsoft-Logo-PNG-1024x378.png" alt="logotipo de microsoft" title="logotipo de microsoft" width="400px" height="200px">
      <!-- para que los lectores de la pantalla puedan entender el contenido de la imagen -->

      <!-- self closing tag son etiquetas que no requieren una etiqueta de cierre se autocierran-->
     
</body>
</html>
