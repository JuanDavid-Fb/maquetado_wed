<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rutas</title>
</head>
<body>
    <h1>explicacion: Rutas absolutas y relativas</h1>

    <section>
        <h2>Rutas Absolutas</h2>
        <!-- ruta completa a un recurso o servidor externo -->
            <P> Para ir a un sitio externo, como el catálogo global de repuestos,usamos la URL completa:
            <a href="https://www.shimano.com">Visitar Shimano Internacional</a>
         </P>

         <img src="Microsoft-Logo-PNG-1024x378.png" alt="Imagen HTML desde un servidor externo" width="300" height="200" title="HTML 5">
    </section>
    <hr>

    <section>
        <h2>Rutas Relativas</h2>
        <!-- Ruta relativa a un recurso dentro del mismo proyecto. La ruta relativa se basa en la ubicación del archivo actual, y se ajusta según la estructura de carpetas-->

        <p>
            Ir a la página de <a href="04_inline_inblock.html">Inline vs Block</a>
            <!-- Funciona si hay un archivo llamado '04_inline_inblock.html' en la misma carpeta.-->
        </p>
        
        <p>
            Ver foto de tecnología <a href="img/imagen_css.png">CSS 3</a>
            <!-- Funciona si hay una imagen llamada 'imagen_css.png' en la carpeta llamada 'img'. -->
        </p>
        
    </section>
</body>
</html>
